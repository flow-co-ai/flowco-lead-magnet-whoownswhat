<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Who owns what. Where it breaks. — Diagnostic</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="final.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="fcore.jsx"></script>
<script type="text/babel" src="fscreens.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Fallback seed for roles with no seam in REVEALS (seo, reputation)
const ROLE_SEED = { paid: "book", tracking: "book", web: "site", crm: "prove", seo: "prove", content: "site", reputation: "ring" };

// Ordered list of (symptom, causeIdx) seams that involve a given role.
function getSteamsForRole(role) {
  const seams = [];
  for (const [sym, data] of Object.entries(REVEALS)) {
    data.causes.forEach((c, i) => {
      if (c.a.role === role || c.b.role === role) {
        seams.push({ symptom: sym, causeIdx: i });
      }
    });
  }
  return seams;
}

function App() {
  const [screen, setScreen] = useState("landing");
  const [symptom, setSymptom] = useState("book");
  const [cause, setCause] = useState(0);
  // Where reveal's back button navigates: "symptom" | "team" | "team-result"
  const [revealBack, setRevealBack] = useState("symptom");
  // Where closing's back button navigates: "crosslink" | "team-result"
  const [closingBack, setClosingBack] = useState("crosslink");
  // Selected roles from TeamScreen, carried into TeamResultScreen
  const [selectedRoles, setSelectedRoles] = useState(new Set());

  const go = (s) => setScreen(s);

  // Cycles to the next seam for a role (used from CrossLink).
  // Does not change revealBack — preserves original entry point.
  const cycleRoleSeam = (role) => {
    const seams = getSteamsForRole(role);
    if (!seams.length) { setSymptom(ROLE_SEED[role]); setCause(0); go("reveal"); return; }
    const cur = seams.findIndex(s => s.symptom === symptom && s.causeIdx === cause);
    const next = seams[(cur + 1) % seams.length];
    setSymptom(next.symptom); setCause(next.causeIdx); go("reveal");
  };

  // Enters reveal from the team grid (first seam for the role).
  const enterRoleFromTeam = (role) => {
    const seams = getSteamsForRole(role);
    const first = seams[0] || { symptom: ROLE_SEED[role], causeIdx: 0 };
    setSymptom(first.symptom); setCause(first.causeIdx);
    setRevealBack("team"); go("reveal");
  };

  // Enters reveal from a team-result connection gap.
  const enterSeamFromResult = (sym, causeIdx) => {
    setSymptom(sym); setCause(causeIdx);
    setRevealBack("team-result"); go("reveal");
  };

  // Enters reveal from a team-result absence role (first seam, or fallback).
  const enterAbsenceRole = (role) => {
    const seams = getSteamsForRole(role);
    const first = seams[0] || { symptom: ROLE_SEED[role], causeIdx: 0 };
    setSymptom(first.symptom); setCause(first.causeIdx);
    setRevealBack("team-result"); go("reveal");
  };

  const render = () => {
    switch (screen) {
      case "landing":
        return <Landing key="landing" onContinue={() => go("symptom")} />;

      case "symptom":
        return <SymptomScreen key="symptom"
          onReveal={(s) => { setSymptom(s); setCause(0); setRevealBack("symptom"); go("reveal"); }}
          onTeam={() => go("team")} />;

      case "reveal":
        return <RevealScreen key={`reveal-${symptom}-${cause}`} symptom={symptom} causeIdx={cause}
          onCause={setCause}
          onBack={() => go(revealBack)}
          onExplore={() => go("crosslink")} />;

      case "crosslink":
        return <CrossLink key={`crosslink-${symptom}-${cause}`} symptom={symptom} causeIdx={cause}
          onRole={cycleRoleSeam}
          onSymptom={(s) => { setSymptom(s); setCause(0); go("reveal"); }}
          onBack={() => go("reveal")}
          onClose={() => { setClosingBack("crosslink"); go("closing"); }} />;

      case "team":
        return <TeamScreen key="team"
          onSymptomDoor={() => go("symptom")}
          onProceed={(sel) => { setSelectedRoles(sel); go("team-result"); }} />;

      case "team-result":
        return <TeamResultScreen key="team-result" selected={selectedRoles}
          onSeam={enterSeamFromResult}
          onAbsenceRole={enterAbsenceRole}
          onBack={() => go("team")}
          onClose={() => { setClosingBack("team-result"); go("closing"); }} />;

      case "closing":
        return <ClosingScreen key="closing" onBack={() => go(closingBack)} />;

      default: return null;
    }
  };

  return (
    <div className="app-shell">
      <div className="viewport">{render()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
